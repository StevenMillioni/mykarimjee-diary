<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Red Hat Text', system-ui, sans-serif;
  background: #f4f1eb;
  min-height: 100vh;
  padding: 16px;
  color: #333;
}

#diary-app {
  max-width: 1400px;
  margin: 0 auto;
  background: white;
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 20px;
  border-bottom: 2px solid #034078;
}

.nav-buttons {
  display: flex;
  gap: 10px;
}

button {
  padding: 8px 16px;
  background: #034078;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 500;
}

button:hover {
  background: #002d5f;
}

.week-view {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

.day-column {
  border: 1px solid #ddd;
  border-radius: 6px;
  overflow: hidden;
}

.day-header {
  background: #034078;
  color: white;
  padding: 12px;
  font-weight: bold;
  text-align: center;
}

.day-header.today {
  background: #C9922A;
}

.day-content {
  padding: 12px;
  min-height: 400px;
  background: #fafaf8;
}

.time-slot {
  margin-bottom: 12px;
  padding: 8px;
  background: white;
  border-left: 3px solid #034078;
  border-radius: 3px;
  font-size: 13px;
}

.time {
  font-weight: bold;
  color: #034078;
  font-size: 12px;
}

.event {
  color: #333;
  margin-top: 2px;
}

.task {
  margin-bottom: 8px;
  padding: 6px 8px;
  background: white;
  border-radius: 3px;
  font-size: 13px;
}

.task.urgent {
  color: #C0392B;
  font-weight: 600;
}

.task.followup {
  color: #034078;
  font-style: italic;
}

.task.done {
  color: #999;
  text-decoration: line-through;
}

.task.mine {
  color: #111;
}

.notes-section {
  background: #fff9f5;
  padding: 12px;
  border-radius: 3px;
  font-size: 12px;
  max-height: 200px;
  overflow-y: auto;
}

.sunday-col {
  grid-column: 1 / -1;
  background: #f0f0f0;
  padding: 12px;
  border-radius: 6px;
  margin-top: 10px;
}

h3 {
  color: #034078;
  margin: 10px 0 8px 0;
  font-size: 14px;
}
</style>
</head>

function getMon(d){const c=new Date(d);c.setDate(c.getDate()-(c.getDay()||7)+1);return c}
function addD(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c}
function clamp(d,min,max){return new Date(Math.max(Math.min(d,max),min))}
function dStr(d){return `${d.getDate()} ${months[d.getMonth()]}`}

function render(){
  const we=addD(wkS,6);
  const tasks=TASKS.filter(t=>{const d=new Date(t.date);return d>=wkS&&d<=we});
  const events=CAL.filter(e=>{const d=new Date(e.date);return d>=wkS&&d<=we});
  
  let html=`<div class="week-view">`;
  
  // Mon-Wed
  for(let i=0;i<3;i++){
    const d=addD(wkS,i);
    const isToday=d.toDateString()===TODAY.toDateString();
    const dayTasks=tasks.filter(t=>new Date(t.date).toDateString()===d.toDateString());
    const dayEvents=events.filter(e=>new Date(e.date).toDateString()===d.toDateString());
    
    html+=`<div class="day-column">
      <div class="day-header ${isToday?'today':''}">
        ${days[d.getDay()]} ${dStr(d)}
      </div>
      <div class="day-content">`;
    
    dayEvents.forEach(e=>{
      html+=`<div class="time-slot"><div class="time">${e.startTime}</div><div class="event">${e.title}</div></div>`;
    });
    
    const urgentTasks=dayTasks.filter(t=>t.taskType==='urgent'&&!t.done);
    const followTasks=dayTasks.filter(t=>t.taskType==='followup'&&!t.done);
    const mineTasks=dayTasks.filter(t=>t.taskType==='mine'&&!t.done);
    const doneTasks=dayTasks.filter(t=>t.done);
    
    [...urgentTasks,...followTasks,...mineTasks,...doneTasks].forEach(t=>{
      const c=t.done?'done':t.taskType==='urgent'?'urgent':t.taskType==='followup'?'followup':'mine';

    });

  </div>`;

}

function prevWeek(){wkS=addD(wkS,-7);render()}
