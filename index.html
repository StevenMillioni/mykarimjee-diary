<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karimjee Executive Diary</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Red Hat Text', system-ui, sans-serif; 
  background: #f4f1eb; 
  padding: 20px;
}
#app { max-width: 1400px; margin: 0 auto; }
.header { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  margin-bottom: 20px;
  background: white;
  padding: 15px 20px;
  border-radius: 8px;
}
.nav { display: flex; gap: 10px; }
button { 
  padding: 8px 16px; 
  background: #034078; 
  color: white; 
  border: none; 
  border-radius: 4px; 
  cursor: pointer;
  font-weight: 500;
}
button:hover { background: #002d5f; }

.spread {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  background: white;
  padding: 20px;
  border-radius: 8px;
  margin-bottom: 20px;
}

.page {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}

.day-column {
  border: 1px solid #ccc;
  border-radius: 4px;
  overflow: hidden;
  font-size: 12px;
}

.day-header {
  background: #034078;
  color: white;
  padding: 8px 4px;
  text-align: center;
  font-weight: bold;
  font-size: 11px;
}

.day-header.today {
  background: #C9922A;
}

.time-slots {
  max-height: 600px;
  overflow-y: auto;
  background: #fafaf8;
}

.time-slot {
  display: flex;
  border-bottom: 1px solid #eee;
  min-height: 30px;
}

.time-label {
  width: 40px;
  padding: 2px 2px;
  font-size: 9px;
  font-weight: 600;
  color: #666;
  background: #f0f0f0;
  border-right: 1px solid #ddd;
  line-height: 1.2;
}

.time-content {
  flex: 1;
  padding: 2px;
  font-size: 9px;
  color: #333;
  overflow: hidden;
  border-right: 1px solid #eee;
}

.notes-section {
  padding: 6px;
  background: #fff9f5;
  border-top: 1px solid #ddd;
  min-height: 80px;
  max-height: 100px;
  overflow-y: auto;
  font-size: 10px;
}

.task {
  margin: 2px 0;
  padding: 2px 4px;
  border-radius: 2px;
}

.task.urgent {
  color: #C0392B;
  font-weight: 600;
}

.task.followup {
  color: #034078;
  font-style: italic;
}

.task.done {
  color: #999;
  text-decoration: line-through;
}

.sunday-row {
  grid-column: 1 / -1;
  border: 1px solid #ccc;
  border-radius: 4px;
  padding: 12px;
  background: #f0f0f0;
  margin-top: 10px;
}

.sunday-row h3 {
  color: #034078;
  font-size: 12px;
  margin-bottom: 8px;
}

.sunday-tasks {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.sunday-tasks .task {
  padding: 4px 8px;
  background: white;
  border-radius: 3px;
  border-left: 3px solid #034078;
  font-size: 11px;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 style="color: #034078; font-size: 20px;">Executive Diary</h1>
    <div class="nav">
      <button onclick="prevWeek()">← Prev</button>
      <button onclick="goToday()">Today</button>
      <button onclick="nextWeek()">Next →</button>
    </div>
  </div>
  <div id="diary"></div>
</div>

<script>
const DS=new Date("2026-06-15"),DE=new Date("2027-06-14");
let TODAY=new Date();TODAY.setHours(0,0,0,0);
let wkS=new Date(TODAY);

const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const TASKS=[
  {id:"t64",title:"Call Brian",date:"2026-07-05",type:"task",taskType:"urgent",done:false},
  {id:"t11",title:"Follow-up: Mostafa on Auto Inc designs",date:"2026-07-24",type:"task",taskType:"followup",done:false},
  {id:"t12",title:"Check Alley's contract",date:"2026-07-24",type:"task",taskType:"mine",done:false},
  {id:"t20",title:"Add procurement, Marketing, HR & digital workshops",date:"2026-07-16",type:"task",taskType:"mine",done:false},
  {id:"t32",title:"Follow-up: Dhruba on Capex & cost allocation model",date:"2026-07-24",type:"task",taskType:"followup",done:false},
  {id:"t44",title:"Prioritize DT & EV tasks",date:"2026-07-14",type:"task",taskType:"mine",done:false},
  {id:"t56",title:"Update AA WBS",date:"2026-07-15",type:"task",taskType:"mine",done:false},
  {id:"t57",title:"Send out Innovatics meeting invites",date:"2026-07-15",type:"task",taskType:"mine",done:false},
  {id:"t62",title:"Review of LPOs",date:"2026-07-17",type:"task",taskType:"mine",done:false},
  {id:"t63",title:"Prepare Finance deck and comms",date:"2026-07-16",type:"task",taskType:"mine",done:false},
  {id:"t65",title:"Confirm New joiners lunch",date:"2026-07-29",type:"task",taskType:"mine",done:false},
  {id:"t66",title:"Follow-Up: Event bills",date:"2026-07-22",type:"task",taskType:"followup",done:false},
  {id:"t67",title:"Send Amit menu and venue LPO status",date:"2026-07-28",type:"task",taskType:"mine",done:false},
  {id:"t68",title:"Confirm Maria HR equipment",date:"2026-07-20",type:"task",taskType:"mine",done:false},
  {id:"t69",title:"Follow-up: John on costings",date:"2026-07-16",type:"task",taskType:"followup",done:false},
  {id:"ot2",title:"Send overtime file",date:"2026-07-30",type:"task",taskType:"mine",done:false}
];

const CAL=[
  {title:"Weekly GCOO Team Meeting",date:"2026-06-29",start:"14:00",end:"15:00"},
  {title:"Cybersecurity Call",date:"2026-06-29",start:"13:00",end:"14:30"},
  {title:"Real Estate Strategy Workshop",date:"2026-07-01",start:"08:30",end:"13:00"},
  {title:"EV Charging Pilot",date:"2026-07-03",start:"11:00",end:"12:00"},
  {title:"DT & EV Workshop",date:"2026-07-10",start:"10:30",end:"12:30"},
  {title:"Auto Inc briefing",date:"2026-07-10",start:"09:00",end:"10:00"},
  {title:"ExCo",date:"2026-07-15",start:"08:30",end:"09:30"},
  {title:"Planning: Finance Strategy Workshop",date:"2026-07-15",start:"11:00",end:"12:00"}
];

function getMon(d){const c=new Date(d);c.setDate(c.getDate()-(c.getDay()||7)+1);return c}
function addD(d,n){const c=new Date(d);c.setDate(c.getDate()+n);return c}
function dStr(d){return d.getDate()+' '+months[d.getMonth()]}

function renderDay(d,dIdx){
  const isToday=d.toDateString()===TODAY.toDateString();
  const dayTasks=TASKS.filter(t=>new Date(t.date).toDateString()===d.toDateString());
  const dayEvents=CAL.filter(e=>new Date(e.date).toDateString()===d.toDateString());
  
  let html=`<div class="day-column">
    <div class="day-header ${isToday?'today':''}">
      ${days[d.getDay()]} ${dStr(d)}
    </div>
    <div class="time-slots">`;
  
  // 30-min slots from 07:00 to 20:00
  for(let h=7;h<20;h++){
    for(let m=0;m<60;m+=30){
      const t=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      const ev=dayEvents.find(e=>e.start<=t&&t<e.end);
      html+=`<div class="time-slot">
        <div class="time-label">${t}</div>
        <div class="time-content">${ev?ev.title:''}</div>
      </div>`;
    }
  }
  
  html+=`</div><div class="notes-section">`;
  
  const urgentTasks=dayTasks.filter(t=>t.taskType==='urgent'&&!t.done);
  const followTasks=dayTasks.filter(t=>t.taskType==='followup'&&!t.done);
  const mineTasks=dayTasks.filter(t=>t.taskType==='mine'&&!t.done);
  const doneTasks=dayTasks.filter(t=>t.done);
  
  [...urgentTasks,...followTasks,...mineTasks,...doneTasks].forEach(t=>{
    const c=t.done?'done':t.taskType==='urgent'?'urgent':t.taskType==='followup'?'followup':'mine';
    html+=`<div class="task ${c}">• ${t.title}</div>`;
  });
  
  html+=`</div></div>`;
  return html;
}

function render(){
  const we=addD(wkS,6);
  let html=`<div class="spread">`;
  
  // Left page: Mon-Wed
  html+=`<div class="page">`;
  for(let i=1;i<4;i++) html+=renderDay(addD(wkS,i),'mon-wed');
  html+=`</div>`;
  
  // Right page: Thu-Sat
  html+=`<div class="page">`;
  for(let i=4;i<7;i++) html+=renderDay(addD(wkS,i),'thu-sat');
  html+=`</div>`;
  
  html+=`</div>`;
  
  // Sunday
  const sun=addD(wkS,6);
  const sunTasks=TASKS.filter(t=>new Date(t.date).toDateString()===sun.toDateString());
  const sunEvents=CAL.filter(e=>new Date(e.date).toDateString()===sun.toDateString());
  
  html+=`<div class="sunday-row">
    <h3>${days[sun.getDay()]} ${dStr(sun)}</h3>
    <div class="sunday-tasks">`;
  
  const allSunTasks=[...sunTasks.filter(t=>!t.done),...sunTasks.filter(t=>t.done)];
  allSunTasks.forEach(t=>{
    const c=t.done?'done':t.taskType==='urgent'?'urgent':t.taskType==='followup'?'followup':'mine';
    html+=`<div class="task ${c}">• ${t.title}</div>`;
  });
  
  sunEvents.forEach(e=>{
    html+=`<div class="task" style="border-left: 3px solid #C9922A;">📅 ${e.title} (${e.start})</div>`;
  });
  
  html+=`</div></div>`;
  
  document.getElementById('diary').innerHTML=html;
}

function prevWeek(){wkS=addD(wkS,-7);wkS=getMon(wkS);render()}
function nextWeek(){wkS=addD(wkS,7);wkS=getMon(wkS);render()}
function goToday(){wkS=getMon(TODAY);render()}

wkS=getMon(TODAY);
render();
</script>
</body>
</html>
