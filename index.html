.slot { display: flex; border-bottom: 1px solid #eee; min-height: 28px; }
.time { width: 40px; padding: 4px; font-size: 10px; background: #f5f5f5; border-right: 1px solid #ddd; }
.event { flex: 1; padding: 4px; font-size: 11px; }
.notes { padding: 8px; background: #fff9f5; border-top: 1px solid #ddd; min-height: 80px; font-size: 11px; }
.task { margin: 2px 0; padding: 2px 4px; }
.task.urgent { color: #C0392B; font-weight: bold; }
.task.followup { color: #034078; font-style: italic; }
.task.done { color: #999; text-decoration: line-through; }

function fmt(d) { return d.getDate() + ' ' + months[d.getMonth()]; }
function addD(d,n) { const c = new Date(d); c.setDate(c.getDate()+n); return c; }

function render() {
  let html = '<div class="week">';
  
  // Mon-Wed
  html += '<div>';
  for(let i=1; i<=3; i++) {
    const d = addD(wkStart, i);
    const isToday = d.toDateString() === TODAY.toDateString();
    const dayTasks = TASKS.filter(t => new Date(t.date).toDateString() === d.toDateString());
    const dayEvts = CAL.filter(e => new Date(e.date).toDateString() === d.toDateString());
    
    html += '<div class="day"><div class="day-header ' + (isToday?'today':'') + '">' + days[d.getDay()] + ' ' + fmt(d) + '</div><div class="times">';
    for(let h=7; h<20; h++) {
      for(let m=0; m<60; m+=30) {
        const t = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
        const e = dayEvts.find(x => x.start <= t && t < x.end);
        html += '<div class="slot"><div class="time">' + t + '</div><div class="event">' + (e?e.title:'') + '</div></div>';
      }
    }
    html += '</div><div class="notes">';
    const ur = dayTasks.filter(t => t.taskType==='urgent' && !t.done);
    const fl = dayTasks.filter(t => t.taskType==='followup' && !t.done);
    const mn = dayTasks.filter(t => t.taskType==='mine' && !t.done);
    const dn = dayTasks.filter(t => t.done);
    [...ur,...fl,...mn,...dn].forEach(t => {
      const c = t.done?'done':t.taskType==='urgent'?'urgent':t.taskType==='followup'?'followup':'mine';
      html += '<div class="task ' + c + '">• ' + t.title + '</div>';
    });
    html += '</div></div>';
  }
  html += '</div>';
  
  // Thu-Sat
  html += '<div>';
  for(let i=4; i<=6; i++) {
    const d = addD(wkStart, i);
    const isToday = d.toDateString() === TODAY.toDateString();
    const dayTasks = TASKS.filter(t => new Date(t.date).toDateString() === d.toDateString());
    const dayEvts = CAL.filter(e => new Date(e.date).toDateString() === d.toDateString());
    
    html += '<div class="day"><div class="day-header ' + (isToday?'today':'') + '">' + days[d.getDay()] + ' ' + fmt(d) + '</div><div class="times">';
    for(let h=7; h<20; h++) {
      for(let m=0; m<60; m+=30) {
        const t = String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
        const e = dayEvts.find(x => x.start <= t && t < x.end);
        html += '<div class="slot"><div class="time">' + t + '</div><div class="event">' + (e?e.title:'') + '</div></div>';
      }
    }
    html += '</div><div class="notes">';
    const ur = dayTasks.filter(t => t.taskType==='urgent' && !t.done);
    const fl = dayTasks.filter(t => t.taskType==='followup' && !t.done);
    const mn = dayTasks.filter(t => t.taskType==='mine' && !t.done);
    const dn = dayTasks.filter(t => t.done);
    [...ur,...fl,...mn,...dn].forEach(t => {
      const c = t.done?'done':t.taskType==='urgent'?'urgent':t.taskType==='followup'?'followup':'mine';
      html += '<div class="task ' + c + '">• ' + t.title + '</div>';
    });
    html += '</div></div>';
  }
  html += '</div>';
  
  html += '</div>';
  document.getElementById('diary').innerHTML = html;
}

function prev() { wkStart = addD(wkStart, -7); render(); }
function next() { wkStart = addD(wkStart, 7); render(); }
function today() { wkStart = new Date(TODAY); wkStart.setDate(wkStart.getDate() - (wkStart.getDay() || 7) + 1); render(); }
