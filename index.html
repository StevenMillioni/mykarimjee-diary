function addD(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function getMon(d) {
  const r = new Date(d);
  r.setHours(0,0,0,0);
  const dw = r.getDay();
  r.setDate(r.getDate() + (dw === 0 ? -6 : 1 - dw));
  return r;
}

function clamp(d, lo, hi) {
  return d < lo ? lo : d > hi ? hi : d;
}

function fmtYMD(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${dd}`;
}

function renderDay(date, isLast) {
  const ds = fmtYMD(date);
  const isT = ds === fmtYMD(TODAY);
  
  const dayTasks = TASKS.filter(t => t.date === ds && t.type === 'task');
  const dayMeetings = CAL.filter(e => e.date === ds && e.startTime && e.endTime);
  
  const ur = dayTasks.filter(t => t.taskType === "urgent" && !t.done);
  const fl = dayTasks.filter(t => t.taskType === "followup" && !t.done);
  const mn = dayTasks.filter(t => t.taskType === "mine" && !t.done);
  const dn = dayTasks.filter(t => t.done);
  
  const allTasks = [...ur, ...fl, ...mn, ...dn];
  
  let notesHTML = "";
  allTasks.slice(0, 10).forEach(t => {
    let c = "note-mine";
    if(t.done) c = "note-done";
    else if(t.taskType === "urgent") c = "note-urgent";
    else if(t.taskType === "followup") c = "note-followup";
    notesHTML += `<div class="note-item ${c}">• ${t.title}</div>`;
  });
  let padCount = allTasks.length;
  while(padCount < 10) {
    notesHTML += `<div class="note-item" style="color: transparent;">—</div>`;
    padCount++;
  }
  
  const SH = 17; // px per 30-min slot, must match CSS row height
  const GRID_START_MIN = 7 * 60;
  const SLOT_COUNT = 26; // 07:00 to 20:00 in 30-min steps
  
  let gridHTML = "";
  for(let h = 7; h < 20; h++) {
    for(let m = 0; m < 60; m += 30) {
      const time = String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0");
      gridHTML += `
        <div class="time-slot">
          <div class="time-label">${m===0 ? time : ""}</div>
          <div class="time-content"></div>
        </div>
      `;
    }
  }
  
  function toMin(t) {
    const [hh, mm] = t.split(":").map(Number);
    return hh * 60 + mm;
  }
  
  let eventsOverlay = "";
  dayMeetings.forEach(e => {
    const startMin = toMin(e.startTime);
    const endMin = toMin(e.endTime);
    const top = Math.round(((startMin - GRID_START_MIN) / 30) * SH);
    const height = Math.max(SH, Math.round(((endMin - startMin) / 30) * SH));
    eventsOverlay += `<div class="event" style="position:absolute; top:${top}px; left:26px; right:2px; height:${height}px;" title="${e.title}">${e.title}</div>`;
  });
  
  return `
    <div class="day">
      <div class="day-header ${isT ? "today" : ""}">${DN[(date.getDay() === 0 ? 6 : date.getDay()-1)]} ${date.getDate()} ${MS[date.getMonth()]}</div>
      <div class="day-content">
        <div class="day-times" style="position:relative;">${gridHTML}${eventsOverlay}</div>
        <div class="day-notes">${notesHTML}</div>
      </div>
    </div>
  `;
}

function renderMiniCal(yr, mo, wkDates) {
  if(mo > 11) { yr++; mo = 0; }
  const dim = new Date(yr, mo + 1, 0).getDate();
  const fd = new Date(yr, mo, 1).getDay();
  const off = fd === 0 ? 6 : fd - 1;
  
  let html = `<div class="mini-cal"><div class="mini-cal-header">${MS[mo]} ${yr}</div><div class="mini-cal-grid">`;
  ["M","T","W","T","F","S","S"].forEach(d => { html += `<div style="font-size: 6px; color: #8A9AB0; font-weight: 600; height: 13px; line-height: 13px;">${d}</div>`; });
  
  for(let i = 0; i < off; i++) html += `<div style="width: 13px; height: 13px;"></div>`;
  for(let d = 1; d <= dim; d++) {
    const ds = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const isToday = ds === fmtYMD(TODAY);
    const inWeek = wkDates.some(wd => fmtYMD(wd) === ds);
    const bg = isToday ? "#034078" : inWeek ? "#e8f0f7" : "transparent";
    const fg = isToday ? "#fff" : inWeek ? "#034078" : "#8A9AB0";
    html += `<div class="mini-cal-day" style="background: ${bg}; color: ${fg};">${d}</div>`;
  }
  
  html += `</div></div>`;
  return html;
}

function getWeekNumber(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dn = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dn);
  const ys = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
  return Math.ceil(((t - ys) / 86400000 + 1) / 7);
}

function nav(d) { wkS = getMon(clamp(addD(wkS, d*7), DS, DE)); render(); }
function goToday() { wkS = getMon(clamp(TODAY, DS, DE)); render(); }
function jump(v) {
  const p = v.split("/");
  if(p.length === 3) {
    const d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    if(!isNaN(d)) { wkS = getMon(clamp(d, DS, DE)); render(); document.getElementById("jumpInput").value = ""; }
  }
}

render();
